<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Demonstração </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


    <link rel="stylesheet" href="./08_demonstracao.css">

</head>

<body>

    <div class="container-fluid">

        <!-- Menu lateral -->
        <div class="row">

            <div class="col-2 menuLateral">

                <div class="text-center mt-5">

                    <img width="40px" class="rounded-circle" src="https://s2-techtudo.glbimg.com/RWlNA8GFD5GoahvjLKz4AHJ47U0=/0x0:1280x720/984x0/smart/filters:strip_icc()/i.s3.glbimg.com/v1/AUTH_08fbf48bc0524877943fe86e43087e7a/internal_photos/bs/2020/C/p/TfJBHRRMWZGBACp3mjaA/apps.46555.14552088507516913.65e423fb-c1ae-4e9d-b981-88b268e24f4f.jpg" />
                    <h1 class="fs-5"> Alex System </h1>

                </div>

                <div class=" list-group list-group-flush fs-3">

                    <a href="#" class="list-group-item list-group-item-action" aria-current="true"> Início </a>
                    <a href="#" class="list-group-item list-group-item-action"> Usuários </a>
                    <a href="#" class="list-group-item list-group-item-action"> Produtos </a>

                </div>

                <div class="text-center menuLateralPerfil">

                    <img width="40px" class="me-3 rounded-circle"  src="https://s2-techtudo.glbimg.com/RWlNA8GFD5GoahvjLKz4AHJ47U0=/0x0:1280x720/984x0/smart/filters:strip_icc()/i.s3.glbimg.com/v1/AUTH_08fbf48bc0524877943fe86e43087e7a/internal_photos/bs/2020/C/p/TfJBHRRMWZGBACp3mjaA/apps.46555.14552088507516913.65e423fb-c1ae-4e9d-b981-88b268e24f4f.jpg" />

                    <button class="btn btn-primary dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false"> Perfil </button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#"> Editar </a></li>
                        <li><a class="dropdown-item" href="#"> Sair </a></li>
                    </ul>

                </div>


            </div>





            <!-- Conteúdo Principal -->

            <div class="col-9">

                <!-- Introdução -->
                <div class="mt-5">
                    <h2> Gerenciamento de usuários </h2>
                    <hr />
                </div>

                <!-- Pesquisa e Filtro-->
                <div class="row">

                    <div class="col-6">

                        <div class="input-group mb-3">
                            <input class="form-control" placeholder="Pesquisar...">
                            <button class="btn btn-outline-secondary"> 🔎 </button>
                        </div>
                    </div>

                    <div class="col-2"></div>

                    <div class="col-4">

                        <select class="form-select">
                            <option selected hidden> Filtrar </option>
                            <option value="1"> Ativo </option>
                            <option value="2"> Inativo </option>
                        </select>
                    </div>

                </div>


                <!-- ID, foto, nome -->
                <div>
                    <table class="table table-striped mt-6">
                        <thead>
                            <tr class="table-dark">
                                <th scope="col">#</th>
                                <th scope="col"> ID </th>
                                <th scope="col">Nome</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <th scope="row">1</th>
                                <td> 001</td>
                                <td> <img class="rounded-circle" src="https://placehold.co/40" /> Otto</td>
                            </tr>
                            <tr>
                                <th scope="row">2</th>
                                <td>114</td>
                                <td> <img class="rounded-circle" src="https://placehold.co/40" /> Thornton</td>
                            </tr>
                            <tr>
                                <th scope="row">3</th>
                                <td>442</td>
                                <td> <img class="rounded-circle" src="https://placehold.co/40" /> Doe</td>
                            </tr>
                            <tr>
                                <th scope="row">4</th>
                                <td> 110 </td>
                                <td> <img class="rounded-circle" src="https://placehold.co/40" /> Doe</td>
                            </tr>
                            <tr>
                                <th scope="row">5</th>
                                <td> 02101 </td>
                                <td> <img class="rounded-circle" src="https://placehold.co/40" /> Doe</td>
                            </tr>
                            <tr>
                                <th scope="row">6</th>
                                <td>111</td>
                                <td> <img class="rounded-circle" src="https://placehold.co/40" /> Lennon </td>
                            </tr>
                            <tr>
                                <th scope="row">7</th>
                                <td> 1010 </td>
                                <td> <img class="rounded-circle" src="https://placehold.co/40" /> Coffe </td>
                            </tr>
                            <div class="text-end my-5">
                                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal"> Novo
                                </button>
                            </div>
                        </tbody>
                    </table>

                </div>

                <!-- Cadastro -->

            </div>


            <!-- Tabela de listagem  -->

        </div>


        <!-- Modals -->
        <div>

            <div class="modal fade" id="exampleModal" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h3 class="modal-title fs-5"> Cadastro de novo usuário </h3>
                            <button class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <div class="form-floating mb-3">
                                <input class="form-control" id="floatingInput" placeholder="name@example.com">
                                <label for="floatingInput"> Nome </label>
                            </div>
                            <div class="form-floating">
                                <input type="password" class="form-control" id="floatingPassword"
                                    placeholder="Password">
                                <label for="floatingPassword"> Senha </label>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button class="btn btn-secondary" data-bs-dismiss="modal"> Fechar </button>
                            <button class="btn btn-primary"> Salvar </button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
