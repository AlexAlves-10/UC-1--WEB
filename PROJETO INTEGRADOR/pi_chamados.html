<h1 style="text-align: center;"> Gerenciador de Equipamentos </h1>

<form onsubmit="salvar(event)">

    
    <label>
        Equipamento:
        <br/>
        <input required class="inputEquipamento"/>
    </label>

     <br/><br/>

    <button type="submit" > Cadastrar </button>
    <button type="reset" > Cancelar </button>

</form>


<hr/>
<br/> <br/>

<table border class="tabelaEquipamentos"> <!-- Inicio da tabela -->

    <tr> <!-- Table row (linha da tabela) -->

        <td> Equipamentos </td> <!-- Table data (dado da tabela) -->
    
    </tr>

</table>


<script>



    function salvar(e){

    e.preventDefault()

    let equipamento = document.querySelector(".inputEquipamento").value
    
     let conteudo = `
       <tr>
           <td> ${equipamento} </td>
       </tr>
   `
   document.querySelector(".tabelaEquipamentos").innerHTML += conteudo


    }

</script>
