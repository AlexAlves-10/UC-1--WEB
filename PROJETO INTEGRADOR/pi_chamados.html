<h1 style="text-align: center;"> Gerenciador de chamados </h1>

<form onsubmit="salvar(event)">

    <label>
        Descrição:
        <br/>
       <textarea required class="inputDescricao"> </textarea> 
    </label>

    <br/><br/>

    <label>
        Setor:
        <br/>
        <input required class="inputSetor"/>
    </label>

     <br/><br/>

    <label>
        Solicitante:
        <br/>
        <input required class="inputSolicitante"/>
    </label>

    <br/><br/>

    <label>
        Anexo:
        <br/>
        <input type="file" class="inputAnexo"/>
    </label>

    <br/><br/>

    <button type="submit" > Salvar </button>
    <button type="reset" > Cancelar </button>

</form>


<hr/>
<br/> <br/>

<table border class="tabelaChamado"> <!-- Inicio da tabela -->

    <tr> <!-- Table row (linha da tabela) -->

        <td> Descrição </td> <!-- Table data (dado da tabela) -->
        <td> Setor </td> 
        <td> Solicitante </td> 
        <td> Anexo </td> 
    
    </tr>

</table>


<script>



    function salvar(e){

    e.preventDefault()

    let descricao = document.querySelector(".inputDescricao").value
    let setor = document.querySelector(".inputSetor").value
    let solicitante = document.querySelector(".inputSolicitante").value
    let anexo = document.querySelector(".inputAnexo").value
    
     let conteudo = `
       <tr>
           <td> ${descricao} </td>
           <td> ${setor} </td>
           <td> ${solicitante} </td>
           <td> ${anexo} </td>
       </tr>
   `
   document.querySelector(".tabelaChamado").innerHTML += conteudo


    }

</script>
